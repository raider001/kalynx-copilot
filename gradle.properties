# Gradle properties for the Kalynx Copilot plugin project

# IntelliJ's bundled JBR (Java 21) is used to run Gradle because the system JDK
# (Java 25) is too new for Gradle 8.12's embedded Kotlin compiler.
org.gradle.java.home=C:/Program Files/JetBrains/IntelliJ IDEA 2025.3.3/jbr

# Give the Gradle daemon more heap — IntelliJ Platform builds can be heavy
org.gradle.jvmargs=-Xmx2g -XX:+HeapDumpOnOutOfMemoryError -Dfile.encoding=UTF-8

# Enable the Gradle build cache for faster incremental builds
org.gradle.caching=true

# Enable Gradle's configuration cache (speeds up task configuration phase)
org.gradle.configuration-cache=true

# Parallel project execution
org.gradle.parallel=true

# Kotlin DSL implicit receiver warning suppression
kotlin.code.style=official

